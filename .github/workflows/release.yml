name: Release to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match csproj <Version>)'
        required: true
        type: string

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --nologo --verbosity minimal

      - name: Pack
        run: dotnet pack src/Serena.Cli/Serena.Cli.csproj --configuration Release --no-build --output nupkg

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "nupkg/*.nupkg" `
            --api-key "$env:NUGET_API_KEY" `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
